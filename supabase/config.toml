project_id = "website-regression-monitoring"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://127.0.0.1:3000", "http://localhost:3000"]

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.scan-artifacts]
public = true
file_size_limit = "50MiB"
allowed_mime_types = ["image/png"]
